<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="robots" content="index, follow" />
  <title>Anne Perera | AI &amp; Full-Stack Developer</title>
  <meta name="description"
    content="Portfolio of Anne Perera, a Computer Science undergraduate at University of Kelaniya specializing in AI/ML research and full-stack development." />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Anne Perera | AI &amp; Full-Stack Developer" />
  <meta property="og:description"
    content="Computer Science undergraduate specializing in AI/ML research, full-stack development, and production-grade systems." />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="Anne Perera | AI &amp; Full-Stack Developer" />
  <meta property="twitter:description"
    content="Computer Science undergraduate specializing in AI/ML research, full-stack development, and production-grade systems." />

  <!-- Structured Data -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Anne Perera",
        "jobTitle": "Computer Science Undergraduate & Full-Stack Developer",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Gampaha",
          "addressCountry": "LK"
        },
        "sameAs": [
          "https://github.com/IdushaniAnnePerera",
          "https://www.linkedin.com/in/anne-perera-b62171359"
        ],
        "description": "Computer Science undergraduate at University of Kelaniya specializing in AI/ML research and full-stack development."
      }
    </script>

  <!-- Fonts: preconnect early, load non-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
  </noscript>
</head>

<body>
  <!-- Inline critical styles so browser paints immediately, before JS loads -->
  <style>
    body {
      margin: 0;
      background: #020202;
    }

    #root {
      min-height: 100vh;
    }

    /* Pre-render loading screen so FCP fires early */
    #initial-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s;
    }

    #initial-loader .ring {
      width: 80px;
      height: 80px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <!-- HTML-only loader shown instantly, removed when React mounts -->
  <div id="initial-loader">
    <div class="ring"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>


</body>

</html>
